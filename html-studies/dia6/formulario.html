<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina</title>
</head>
<body>
    
    <h1>Formulario aqui</h1>
    <p></p>
<!--LEGENDA PARA NOME-->
    <form>
    <label for="campo_nome">Nome:</label>
    <!--CAMPO INPUT TYPE TEXT-->
    <input id="campo_nome" type="text"
    placeholder="Digite seu nome"
    required> 

    <br><br>
<!--LEGENDA PARA EMAIL-->
    <label for="campo_email">Email:</label>
    <!--CAMPO INPUT DO TYPE EMAIL-->
    <input id="campo_email" type="email"
    placeholder="Digite um email"
    required>

    <br><br>
<!--LEGENDA PARA SENHA-->
    <label for="campo_senha">Senha:</label>
    <!--CAMPO INPUT DO TYPE PASSWORD-->
    <input id="campo_senha" type="password"
    placeholder="Digite uma senha"
    required>

    <h2>Animal de estimacao</h2>
    <input type="radio" id="dog" name="animal" value="Cachorro">
    <label for="dog">Cachorro</label>
    <br><br>

    <input type="radio" id="cat" name="animal" value="Gato">
    <label for="cat">Gato</label>
    <br><br>

    <input type="radio" id="bird" name="animal" value="Passarinho">
    <label for="bird">Passarinho</label>
    <br><br>
    <hr><br>

    <h2>O que voce tem em casa?</h2>
    <input id="item1" type="checkbox" name="item1" value="TV">
    <label for="item1">TV</label>
    <br><br>

    <input id="item2" type="checkbox" name="item2" value="Geladeira">
    <label for="item2">Geladeira</label>
    <br><br>

    <input id="item3" type="checkbox" name="item3" value="Computador">
    <label for="item3">Computador</label>
    <br><br><hr>

    <h2>Escolha uma cor</h2>

    <select name="cores">
        <option selected disabled
         value="">Selecione uma cor
        </option>
        <option value="vermelho">Vermelho
        </option>
        <option value="amarelo">Amarelo
        </option>
        <option value="roxo">Roxo
        </option>
        <option value="azul">Azul
        </option>
    </select>

    <br><br>

    <h2>Digite sua mensagem:</h2>
    <textarea name="mensagem" placeholder="Digite aqui sua mensagem" rows="15" cols="75"></textarea>
    <br><br>

<!--CAMPO INPUT TYPE SUBMIT-->
    <input type="submit" value="Enviar formulario">
   

</form>
<br><hr>

<a href="day6form.html">Voltar para principal</a>
</body>
</html>
